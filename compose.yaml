name: ${COMPOSE_PROJECT_NAME:-myblog-v2}

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+09:00
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mysqladmin ping --protocol=socket --user=root
          --password="$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    mem_limit: 768m
    cpus: "1.00"
    networks:
      - private

  api:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER is required}/myblog-api:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Tokyo
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Tokyo
      MYBLOG_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=Asia/Tokyo&forceConnectionToSession=true&sessionVariables=time_zone='%2B09:00'"
      MYBLOG_DATASOURCE_USERNAME: ${MYSQL_USER}
      MYBLOG_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      MYBLOG_JWT_SECRET: ${MYBLOG_JWT_SECRET:?MYBLOG_JWT_SECRET is required}
      MYBLOG_STATS_HASH_SECRET: ${MYBLOG_STATS_HASH_SECRET:?MYBLOG_STATS_HASH_SECRET is required}
      MYBLOG_STORAGE_TYPE: ${MYBLOG_STORAGE_TYPE:-S3}
      MYBLOG_STORAGE_S3_REGION: ${MYBLOG_STORAGE_S3_REGION:?MYBLOG_STORAGE_S3_REGION is required}
      MYBLOG_STORAGE_S3_BUCKET: ${MYBLOG_STORAGE_S3_BUCKET:?MYBLOG_STORAGE_S3_BUCKET is required}
      MYBLOG_STORAGE_S3_PUBLIC_BASE_URL: ${MYBLOG_STORAGE_S3_PUBLIC_BASE_URL:?MYBLOG_STORAGE_S3_PUBLIC_BASE_URL is required}
      MYBLOG_CORS_ALLOWED_ORIGINS: ${BLOG_ORIGIN:?BLOG_ORIGIN is required},${ADMIN_ORIGIN:?ADMIN_ORIGIN is required}
      MYBLOG_WEB_TRUSTED_PROXIES: ${MYBLOG_WEB_TRUSTED_PROXIES:-172.28.0.0/16}
      MYBLOG_RESEND_ENABLED: ${MYBLOG_RESEND_ENABLED:-false}
      MYBLOG_RESEND_API_KEY: ${MYBLOG_RESEND_API_KEY:-}
      MYBLOG_RESEND_FROM_EMAIL: ${MYBLOG_RESEND_FROM_EMAIL:-}
      MYBLOG_BOOTSTRAP_ADMIN_ENABLED: ${MYBLOG_BOOTSTRAP_ADMIN_ENABLED:-false}
      MYBLOG_BOOTSTRAP_ADMIN_USERNAME: ${MYBLOG_BOOTSTRAP_ADMIN_USERNAME:-}
      MYBLOG_BOOTSTRAP_ADMIN_PASSWORD: ${MYBLOG_BOOTSTRAP_ADMIN_PASSWORD:-}
      MYBLOG_BOOTSTRAP_ADMIN_EXIT_AFTER_RUN: ${MYBLOG_BOOTSTRAP_ADMIN_EXIT_AFTER_RUN:-false}
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://127.0.0.1:8080/actuator/health
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    mem_limit: 768m
    cpus: "1.00"
    networks:
      - private

  web:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER is required}/myblog-web:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      BLOG_HOST: ${BLOG_HOST:?BLOG_HOST is required}
      WWW_HOST: ${WWW_HOST:?WWW_HOST is required}
      ADMIN_HOST: ${ADMIN_HOST:?ADMIN_HOST is required}
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget --no-check-certificate --quiet --spider
          https://$${BLOG_HOST}/healthz
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    mem_limit: 256m
    cpus: "0.50"
    networks:
      - private

volumes:
  mysql-data:
  caddy-data:
  caddy-config:

networks:
  private:
    name: myblog-v2-private
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
