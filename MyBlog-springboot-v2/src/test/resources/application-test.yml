spring:
  datasource:
    url: jdbc:h2:mem:myblog_v2_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: true

myblog:
  cors:
    allowed-origins:
      - http://localhost:5173
  security:
    jwt:
      issuer: myblog-v2-test
      secret: test-secret-test-secret-test-secret-123456
      access-token-ttl: 15m
    public-endpoints:
      - method: GET
        path: /actuator/health
      - method: GET
        path: /api/public/security-probe
      - method: POST
        path: /api/auth/login
      - method: GET
        path: /api/categories
      - method: GET
        path: /api/tags
      - method: GET
        path: /api/tags/top
      - method: GET
        path: /api/articles
      - method: GET
        path: /api/articles/*
      - method: POST
        path: /api/articles/*/access
      - method: GET
        path: /api/categories/*/articles
      - method: GET
        path: /api/tags/*/articles
      - method: GET
        path: /api/comments
      - method: GET
        path: /api/comments/*/replies
      - method: GET
        path: /api/comments/top
