spring:
  datasource:
    url: jdbc:h2:mem:myblog_v2_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

myblog:
  stats:
    hash-secret: test-stats-secret-test-stats-secret-123456
    page-view-max-requests-per-minute: 120
    rate-limit-maximum-size: 20000
    scheduling:
      enabled: false
      aggregate-cron: "0 */5 * * * *"
      maintenance-cron: "0 30 3 * * *"
  storage:
    type: LOCAL
    max-file-size: 10MB
    local:
      root: ${java.io.tmpdir}/myblog-v2-test/uploads
      bucket-alias: local
      public-base-url: http://localhost/media
  cors:
    allowed-origins:
      - http://localhost:5173
  ratelimit:
    login-max-failures: 5
    login-cooldown: 10m
    login-maximum-size: 10000
  security:
    jwt:
      issuer: myblog-v2-test
      secret: test-secret-test-secret-test-secret-123456
      access-token-ttl: 15m
      refresh-token-ttl: 7d
    password:
      login-max-attempts: 5
      login-cooldown: 10m
      bcrypt-strength: 10
    public-endpoints:
      - method: GET
        path: /actuator/health
      - method: POST
        path: /api/auth/login
      - method: POST
        path: /api/auth/refresh
      - method: GET
        path: /api/public/site-config
      - method: GET
        path: /api/public/friend-links
      - method: GET
        path: /api/public/categories
      - method: GET
        path: /api/public/tags
      - method: GET
        path: /api/public/articles
      - method: GET
        path: /api/public/articles/**
      - method: POST
        path: /api/public/articles/*/comments
      - method: GET
        path: /api/public/guestbook/comments
      - method: POST
        path: /api/public/guestbook/comments
      - method: POST
        path: /api/public/stats/page-views
      - method: GET
        path: /api/public/security-probe
      - method: GET
        path: /doc.html
      - method: GET
        path: /webjars/**
      - method: GET
        path: /v3/api-docs/**
      - method: GET
        path: /swagger-ui/**
      - method: GET
        path: /media/**
  content:
    article-publish:
      enabled: false
