spring:
  datasource:
    url: jdbc:h2:mem:myblog_v2_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

myblog:
  cors:
    allowed-origins:
      - http://localhost:5173
  security:
    jwt:
      issuer: myblog-v2-test
      secret: test-secret-test-secret-test-secret-123456
      access-token-ttl: 15m
      refresh-token-ttl: 7d
    password:
      login-max-attempts: 5
      login-cooldown: 10m
      bcrypt-strength: 10
    public-endpoints:
      - method: GET
        path: /actuator/health
      - method: GET
        path: /api/public/security-probe
      - method: GET
        path: /doc.html
      - method: GET
        path: /webjars/**
      - method: GET
        path: /v3/api-docs/**
      - method: GET
        path: /swagger-ui/**
