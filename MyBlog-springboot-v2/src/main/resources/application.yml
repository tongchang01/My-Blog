spring:
  application:
    name: myblog-v2
  jackson:
    time-zone: Asia/Tokyo
    date-format: yyyy-MM-dd'T'HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

knife4j:
  enable: false

management:
  endpoints:
    web:
      exposure:
        include: health

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

myblog:
  cors:
    allowed-origins: []
  ratelimit:
    login-max-failures: 5
    login-cooldown: 10m
    login-maximum-size: 10000
  web:
    trusted-proxies: []
  security:
    jwt:
      issuer: myblog-v2
      secret: ${MYBLOG_JWT_SECRET}
      access-token-ttl: 15m
      refresh-token-ttl: 7d
    password:
      login-max-attempts: 5
      login-cooldown: 10m
      bcrypt-strength: 10
    public-endpoints:
      - method: GET
        path: /actuator/health
