spring:
  application:
    name: myblog-v2
  profiles:
    default: local

management:
  endpoints:
    web:
      exposure:
        include: health

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

myblog:
  cors:
    allowed-origins:
      - http://localhost:5173
  security:
    jwt:
      issuer: myblog-v2
      secret: ${MYBLOG_JWT_SECRET:change-me-change-me-change-me-change-me}
      access-token-ttl: 15m
    public-endpoints:
      - /actuator/health
      - /api/auth/login
      - /api/categories
      - /api/tags
      - /api/tags/top
      - /api/articles
      - /api/articles/*
      - /api/articles/*/access
      - /api/categories/*/articles
      - /api/tags/*/articles
      - /api/comments
      - /api/comments/*/replies
      - /api/comments/top
