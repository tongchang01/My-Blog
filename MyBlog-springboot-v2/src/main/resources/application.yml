spring:
  application:
    name: myblog-v2
  profiles:
    default: local

management:
  endpoints:
    web:
      exposure:
        include: health

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

myblog:
  cors:
    allowed-origins:
      - http://localhost:5173
  security:
    jwt:
      issuer: myblog-v2
      secret: ${MYBLOG_JWT_SECRET}
      access-token-ttl: 15m
    public-endpoints:
      - method: GET
        path: /actuator/health
