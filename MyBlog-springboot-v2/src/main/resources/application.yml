spring:
  application:
    name: myblog-v2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  jackson:
    time-zone: Asia/Tokyo
    date-format: yyyy-MM-dd'T'HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

knife4j:
  enable: false

management:
  endpoints:
    web:
      exposure:
        include: health

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

myblog:
  storage:
    type: LOCAL
    max-file-size: 10MB
    local:
      root: ${MYBLOG_STORAGE_LOCAL_ROOT:${java.io.tmpdir}/myblog-v2/uploads}
      bucket-alias: local
      public-base-url: ${MYBLOG_STORAGE_LOCAL_PUBLIC_BASE_URL:http://localhost:8080/media}
  cors:
    allowed-origins: []
  ratelimit:
    login-max-failures: 5
    login-cooldown: 10m
    login-maximum-size: 10000
  mail:
    resend:
      enabled: false
      api-key: ${MYBLOG_RESEND_API_KEY:}
      from-email: ${MYBLOG_RESEND_FROM_EMAIL:}
  stats:
    hash-secret: ${MYBLOG_STATS_HASH_SECRET:}
    page-view-max-requests-per-minute: 120
    rate-limit-maximum-size: 20000
    scheduling:
      enabled: true
      aggregate-cron: "0 */5 * * * *"
      maintenance-cron: "0 30 3 * * *"
  web:
    trusted-proxies: []
  comment:
    audit:
      blocked-keywords: []
  security:
    jwt:
      issuer: myblog-v2
      secret: ${MYBLOG_JWT_SECRET}
      access-token-ttl: 15m
      refresh-token-ttl: 7d
    password:
      login-max-attempts: 5
      login-cooldown: 10m
      bcrypt-strength: 10
    public-endpoints:
      - method: GET
        path: /actuator/health
      - method: POST
        path: /api/auth/login
      - method: POST
        path: /api/auth/refresh
      - method: GET
        path: /api/public/site-config
      - method: GET
        path: /api/public/friend-links
      - method: GET
        path: /api/public/categories
      - method: GET
        path: /api/public/tags
      - method: GET
        path: /api/public/articles
      - method: GET
        path: /api/public/articles/**
      - method: POST
        path: /api/public/articles/*/comments
      - method: GET
        path: /api/public/guestbook/comments
      - method: POST
        path: /api/public/guestbook/comments
      - method: POST
        path: /api/public/stats/page-views
  content:
    article-publish:
      enabled: true
      cron: "0 * * * * *"
