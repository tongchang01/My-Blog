spring:
  datasource:
    url: ${MYBLOG_DATASOURCE_URL:jdbc:mysql://localhost:3306/aurora?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Tokyo}
    username: ${MYBLOG_DATASOURCE_USERNAME:root}
    password: ${MYBLOG_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

myblog:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
  security:
    jwt:
      issuer: myblog-v2-local
      secret: local-secret-local-secret-local-secret-123456
      access-token-ttl: 15m
    public-endpoints:
      - method: GET
        path: /actuator/health
      - method: GET
        path: /api/public/security-probe
      - method: GET
        path: /doc.html
      - method: GET
        path: /webjars/**
      - method: GET
        path: /v3/api-docs/**
      - method: GET
        path: /swagger-ui/**
