spring:
  datasource:
    url: ${MYBLOG_DATASOURCE_URL:jdbc:mysql://localhost:3306/myblog_v2_dev?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=Asia/Tokyo&forceConnectionTimeToSession=true&sessionVariables=time_zone='%2B09:00'}
    username: ${MYBLOG_DATASOURCE_USERNAME}
    password: ${MYBLOG_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

myblog:
  stats:
    hash-secret: ${MYBLOG_STATS_HASH_SECRET}
  storage:
    type: LOCAL
    local:
      root: ${MYBLOG_STORAGE_LOCAL_ROOT:${user.home}/.myblog-v2/uploads}
      bucket-alias: local
      public-base-url: ${MYBLOG_STORAGE_LOCAL_PUBLIC_BASE_URL:http://localhost:8080/media}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:8848
      - http://127.0.0.1:8848
  security:
    jwt:
      issuer: myblog-v2-local
      secret: ${MYBLOG_JWT_SECRET}
      access-token-ttl: 15m
      refresh-token-ttl: 7d
    additional-public-endpoints:
      - method: GET
        path: /api/public/security-probe
      - method: GET
        path: /doc.html
      - method: GET
        path: /webjars/**
      - method: GET
        path: /v3/api-docs/**
      - method: GET
        path: /swagger-ui/**
      - method: GET
        path: /media/**
  content:
    article-publish:
      enabled: true
      cron: "0 * * * * *"
