spring:
  datasource:
    url: ${MYBLOG_DATASOURCE_URL:jdbc:mysql://localhost:3306/aurora?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Tokyo}
    username: ${MYBLOG_DATASOURCE_USERNAME:root}
    password: ${MYBLOG_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false

myblog:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
  security:
    public-endpoints:
      - method: GET
        path: /actuator/health
      - method: GET
        path: /api/public/security-probe
      - method: POST
        path: /api/auth/login
      - method: GET
        path: /api/categories
      - method: GET
        path: /api/tags
      - method: GET
        path: /api/tags/top
      - method: GET
        path: /api/articles
      - method: GET
        path: /api/articles/*
      - method: POST
        path: /api/articles/*/access
      - method: GET
        path: /api/categories/*/articles
      - method: GET
        path: /api/tags/*/articles
      - method: GET
        path: /api/comments
      - method: GET
        path: /api/comments/*/replies
      - method: GET
        path: /api/comments/top
