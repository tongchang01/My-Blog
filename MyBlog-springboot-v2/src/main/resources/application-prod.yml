spring:
  datasource:
    url: ${MYBLOG_DATASOURCE_URL}
    username: ${MYBLOG_DATASOURCE_USERNAME}
    password: ${MYBLOG_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

knife4j:
  enable: false

management:
  endpoints:
    web:
      exposure:
        include: health

myblog:
  storage:
    type: ${MYBLOG_STORAGE_TYPE:S3}
    max-file-size: 10MB
    s3:
      region: ${MYBLOG_STORAGE_S3_REGION}
      bucket: ${MYBLOG_STORAGE_S3_BUCKET}
      public-base-url: ${MYBLOG_STORAGE_S3_PUBLIC_BASE_URL}
  cors:
    allowed-origins: ${MYBLOG_CORS_ALLOWED_ORIGINS:}
  mail:
    resend:
      enabled: ${MYBLOG_RESEND_ENABLED:false}
      api-key: ${MYBLOG_RESEND_API_KEY:}
      from-email: ${MYBLOG_RESEND_FROM_EMAIL:}
  security:
    jwt:
      issuer: myblog-v2
      secret: ${MYBLOG_JWT_SECRET}
      access-token-ttl: 15m
      refresh-token-ttl: 7d
