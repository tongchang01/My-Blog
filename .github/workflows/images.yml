# 生产镜像发布：只推送提交 SHA 标签，不把 latest 当作发布依据。
name: Publish container images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish GHCR images
    if: >-
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      OWNER: ${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./MyBlog-springboot-v2
          file: ./MyBlog-springboot-v2/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/myblog-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=myblog-api
          cache-to: type=gha,mode=max,scope=myblog-api

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/myblog-web:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=myblog-web
          cache-to: type=gha,mode=max,scope=myblog-web
