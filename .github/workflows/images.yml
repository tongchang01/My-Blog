# 生产镜像发布：只推送提交 SHA 标签，不把 latest 当作发布依据。
name: Publish container images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish GHCR images
    if: >-
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      OWNER: ${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./MyBlog-springboot-v2
          file: ./MyBlog-springboot-v2/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/myblog-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=myblog-api
          cache-to: type=gha,mode=max,scope=myblog-api

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/myblog-web:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=myblog-web
          cache-to: type=gha,mode=max,scope=myblog-web

  deploy:
    name: Deploy production
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: myblog-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_SHA: ${{ github.sha }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      CD_SECURITY_GROUP_ID: ${{ vars.CD_SECURITY_GROUP_ID }}
      PROD_HOST: ${{ vars.PROD_HOST }}
      PROD_PORT: ${{ vars.PROD_PORT }}
      PROD_USER: ${{ vars.PROD_USER }}

    steps:
      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: myblog-cd-${{ github.run_id }}

      - name: Resolve runner SSH address
        id: runner-ip
        run: echo "cidr=$(curl -4fsS https://api.ipify.org)/32" >> "$GITHUB_OUTPUT"

      - name: Allow temporary SSH ingress
        id: ssh-ingress
        env:
          RUNNER_CIDR: ${{ steps.runner-ip.outputs.cidr }}
        run: >-
          aws ec2 authorize-security-group-ingress
          --group-id "$CD_SECURITY_GROUP_ID"
          --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=$RUNNER_CIDR,Description=myblog-github-cd}]"

      - name: Configure deploy SSH identity
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/myblog-cd
          printf '%s\n' "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/myblog-cd ~/.ssh/known_hosts

      - name: Deploy same SHA
        run: >-
          ssh -i ~/.ssh/myblog-cd -p "$PROD_PORT"
          -o BatchMode=yes
          -o StrictHostKeyChecking=yes
          -o UserKnownHostsFile=~/.ssh/known_hosts
          "$PROD_USER@$PROD_HOST"
          "deploy $RELEASE_SHA"

      - name: Smoke test public HTTPS
        run: |
          for url in \
            https://tong-yibin.com/healthz \
            https://www.tong-yibin.com/healthz \
            https://admin.tong-yibin.com/healthz; do
            test "$(curl --fail --silent --show-error --max-time 20 "$url")" = ok
          done

      - name: Revoke temporary SSH ingress
        if: always() && steps.ssh-ingress.outcome == 'success'
        env:
          RUNNER_CIDR: ${{ steps.runner-ip.outputs.cidr }}
        run: >-
          aws ec2 revoke-security-group-ingress
          --group-id "$CD_SECURITY_GROUP_ID"
          --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=$RUNNER_CIDR}]"
